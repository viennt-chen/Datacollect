version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
      - "1883:1883"      # MQTT
      - "15675:15675"    # MQTT over WebSocket
    environment:
      RABBITMQ_DEFAULT_USER: data_collection
      RABBITMQ_DEFAULT_PASS: data_collection
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/conf.d/20-custom.conf
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins
    restart: unless-stopped

volumes:
  rabbitmq_data:
